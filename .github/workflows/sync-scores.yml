name: Sync Scores

on:
  schedule:
    # Roda a cada 20 minutos durante o horário de jogos (12h-04h UTC = 09h-01h BRT)
    # ~51 chamadas/dia — deixa ~49 de margem no limite de 100/dia da API gratuita
    - cron: "*/20 12-23 * * *"
    - cron: "*/20 0-4 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger score sync
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "X-Sync-Key: ${{ secrets.SYNC_SECRET }}" \
            "${{ secrets.APP_URL }}/api/sync/auto"
