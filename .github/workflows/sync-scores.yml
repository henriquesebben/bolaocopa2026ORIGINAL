name: Sync Scores

on:
  schedule:
    # Roda a cada 14 minutos — mantém o servidor Render acordado (dorme após 15 min)
    # ~68 chamadas/dia — deixa ~32 de margem no limite de 100/dia da API gratuita
    - cron: "*/14 12-23 * * *"
    - cron: "*/14 0-4 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger score sync
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "X-Sync-Key: ${{ secrets.SYNC_SECRET }}" \
            "${{ secrets.APP_URL }}/api/sync/auto"
