services:
  - type: web
    name: bolao-copa-2026
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_NOME
        sync: false
      - key: ADMIN_SENHA
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: ALLOW_ORIGINS
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: SYNC_SECRET
        sync: false
